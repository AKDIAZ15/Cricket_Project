version: "3.8"

services:

  cassandra:
    image: cassandra:4.1
    container_name: cassandra-db
    ports:
      - "9042:9042"

  redis:
    image: redis:latest
    container_name: redis-cache
    ports:
      - "6379:6379"

  flask-app:
    build: .
    container_name: cricket-api
    ports:
      - "5000:5000"
    depends_on:
      - cassandra
      - redis